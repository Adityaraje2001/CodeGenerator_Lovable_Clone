<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>Colorful Todo App</h1>
        <section class="input-section">
            <input id="new-task-input" type="text" placeholder="What needs to be done?" autocomplete="off" />
            <button id="add-task-btn" aria-label="Add task">+</button>
        </section>
        <ul id="task-list" class="task-list"></ul>
        <div class="footer">
            <span id="items-left" class="items-left"></span>
            <div class="filters">
                <button class="filter-btn" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <button id="clear-completed" class="clear-btn">Clear Completed</button>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
